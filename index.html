<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery Scanner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2eb;
      --surface: #ffffff;
      --surface2: #edeae2;
      --ink: #1a1a18;
      --ink2: #5a5a52;
      --accent: #2a6b3c;
      --accent-light: #e8f4ec;
      --warn: #b85c00;
      --warn-light: #fff3e6;
      --danger: #b82a2a;
      --danger-light: #fde8e8;
      --border: #d8d4c8;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Manrope', sans-serif;
      min-height: 100vh;
      padding-bottom: 160px;
    }

    /* HEADER */
    header {
      background: var(--ink);
      color: var(--bg);
      padding: 18px 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { font-size: 1.4rem; }
    .logo-text { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.3px; }
    .logo-text span { color: #c8f135; }

    .tally-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: 8px 16px;
    }

    .tally-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .tally-amount {
      font-family: 'DM Mono', monospace;
      font-size: 1.1rem;
      font-weight: 500;
      color: #c8f135;
      transition: all 0.3s;
    }

    .tally-amount.bump { transform: scale(1.15); color: #fff; }

    /* TABS */
    .tab-bar {
      display: flex;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 0 24px;
      gap: 4px;
      position: sticky;
      top: 62px;
      z-index: 100;
    }

    .tab-btn {
      padding: 14px 16px 12px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      font-family: 'Manrope', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--ink2);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* CONTENT */
    .content { padding: 20px 24px; max-width: 640px; margin: 0 auto; }
    .panel { display: none; }
    .panel.active { display: block; }

    /* SCANNER */
    .scanner-wrap {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .scanner-idle {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 200px;
      color: var(--ink2);
    }

    .scanner-idle .big-icon { font-size: 3rem; }
    .scanner-idle p { font-size: 0.85rem; font-weight: 500; }

    .scanner-live {
      display: none;
      position: relative;
      aspect-ratio: 4/3;
      background: #000;
    }

    #interactive.viewport { width: 100%; height: 100%; }
    #interactive.viewport canvas,
    #interactive.viewport video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
    }

    .scan-overlay { position: absolute; inset: 0; pointer-events: none; }

    .scan-frame {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -60%);
      width: 65%; height: 36%;
      border: 2px solid rgba(200,241,53,0.8);
      border-radius: 6px;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.35);
      overflow: hidden;
    }

    .scan-beam {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #c8f135, transparent);
      animation: beam 1.8s ease-in-out infinite;
    }

    @keyframes beam {
      0%   { top: 0;    opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    .scanner-controls {
      display: flex;
      gap: 10px;
      padding: 14px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
    }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 11px 20px;
      border: none;
      border-radius: 10px;
      font-family: 'Manrope', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.97); }
    .btn-green  { background: var(--accent); color: #fff; flex: 1; }
    .btn-green:hover  { background: #235730; }
    .btn-ghost  { background: transparent; color: var(--ink2); border: 1.5px solid var(--border); }
    .btn-ghost:hover  { background: var(--surface2); }
    .btn-danger { background: var(--danger-light); color: var(--danger); border: 1.5px solid #f0c0c0; }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-warn   { background: var(--warn-light);   color: var(--warn);   border: 1.5px solid #f8d5b0; }
    .btn-warn:hover   { background: var(--warn);   color: #fff; }
    .btn-dark   { background: var(--ink); color: var(--bg); flex: 1; }
    .btn-dark:hover   { background: #333; }

    /* MANUAL */
    .manual-row { display: flex; gap: 10px; margin-bottom: 20px; }

    .input-field {
      flex: 1;
      padding: 12px 16px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }

    .input-field:focus { border-color: var(--accent); }
    .input-field::placeholder { color: #bbb; font-family: 'Manrope', sans-serif; }

    /* FLASH */
    .flash {
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 16px;
      display: none;
      animation: fadein 0.25s ease;
    }

    .flash.success { background: var(--accent-light); color: var(--accent); border: 1px solid #b0dbbe; display: block; }
    .flash.warn    { background: var(--warn-light);   color: var(--warn);   border: 1px solid #f8d5b0; display: block; }
    .flash.error   { background: var(--danger-light); color: var(--danger); border: 1px solid #f0c0c0; display: block; }

    @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    /* SECTION LABEL */
    .section-label {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--ink2);
      margin-bottom: 10px;
    }

    /* CART CARDS */
    .cart-list { display: flex; flex-direction: column; gap: 8px; }

    .cart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: fadein 0.3s ease;
      box-shadow: var(--shadow);
      transition: border-color 0.15s, background 0.15s;
    }

    .cart-card:hover { border-color: var(--accent); background: var(--accent-light); }

    .cart-dept {
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--ink2);
      background: var(--surface2);
      padding: 3px 8px;
      border-radius: 999px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .cart-info { flex: 1; min-width: 0; }

    .cart-name {
      font-weight: 700;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cart-barcode {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--ink2);
      margin-top: 2px;
    }

    .cart-price-block { text-align: right; flex-shrink: 0; }

    .cart-line-total {
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      font-size: 1rem;
      color: var(--accent);
    }

    .cart-qty {
      font-size: 0.72rem;
      color: var(--ink2);
      margin-top: 2px;
      font-family: 'DM Mono', monospace;
    }

    .cart-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 1rem;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .cart-remove:hover { color: var(--danger); }

    .empty-state { text-align: center; padding: 48px 24px; color: var(--ink2); }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.88rem; }

    /* PRODUCT CARDS */
    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: fadein 0.3s ease;
      box-shadow: var(--shadow);
      transition: border-color 0.15s, background 0.15s;
    }

    .product-card:hover { border-color: var(--accent); background: var(--accent-light); }

    .product-icon { font-size: 1.8rem; flex-shrink: 0; }
    .product-info { flex: 1; min-width: 0; }
    .product-name { font-weight: 700; font-size: 0.9rem; }

    .product-meta {
      font-size: 0.72rem;
      color: var(--ink2);
      margin-top: 3px;
      font-family: 'DM Mono', monospace;
    }

    .product-price {
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .product-actions { display: flex; gap: 6px; }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      padding: 5px 8px;
      border-radius: 6px;
      transition: all 0.2s;
      color: var(--ink2);
      line-height: 1;
    }

    .icon-btn:hover { background: var(--surface2); }
    .icon-btn.del:hover { background: var(--danger-light); color: var(--danger); }

    /* CHECKBOX */
    .product-cb {
      width: 18px; height: 18px;
      cursor: pointer;
      accent-color: var(--accent);
      flex-shrink: 0;
    }

    .product-card.selected {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    /* BATCH TOOLBAR */
    .batch-toolbar {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--accent-light);
      border: 1px solid #b0dbbe;
      border-radius: 10px;
      margin-bottom: 10px;
      animation: fadein 0.2s ease;
    }

    .batch-toolbar.visible { display: flex; }

    .batch-count {
      flex: 1;
      font-size: 0.83rem;
      font-weight: 700;
      color: var(--accent);
    }


    .search-row { display: flex; gap: 10px; margin-bottom: 14px; }

    .search-field {
      flex: 1;
      padding: 10px 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Manrope', sans-serif;
      font-size: 0.85rem;
      color: var(--ink);
      outline: none;
    }

    .search-field:focus { border-color: var(--accent); }
    .search-field::placeholder { color: #bbb; }

    /* MODAL */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,26,24,0.65);
      backdrop-filter: blur(4px);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-backdrop.open { display: flex; animation: fadein 0.2s ease; }

    .modal {
      background: var(--surface);
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      animation: slide-up 0.25s ease;
      max-height: 90vh;
      overflow-y: auto;
    }

    @keyframes slide-up {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-header { margin-bottom: 20px; }

    .modal-eyebrow {
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .modal-title { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.3px; }
    .modal-barcode { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--ink2); margin-top: 4px; }

    .form-group { margin-bottom: 14px; }

    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--ink2);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Manrope', sans-serif;
      font-size: 0.9rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus { border-color: var(--accent); }

    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

    /* BOTTOM BAR */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 2px solid var(--border);
      padding: 14px 24px 24px;
      display: flex;
      gap: 10px;
      z-index: 300;
    }

    /* COMPLETE MODAL SUMMARY */
    .summary-total {
      background: var(--ink);
      color: var(--bg);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 16px 0;
    }

    .summary-total-label { font-size: 0.85rem; font-weight: 600; }
    .summary-total-amount { font-family: 'DM Mono', monospace; font-size: 1.5rem; color: #c8f135; }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }

    .summary-row:last-of-type { border-bottom: none; }
    .summary-row .price { font-family: 'DM Mono', monospace; font-weight: 500; }

    /* ITEMS GRID */
    .items-grid { display: flex; flex-direction: column; gap: 8px; }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: var(--bg);
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      z-index: 999;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }

    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 420px) {
      .content { padding: 16px; }
      .form-row { flex-direction: column; }
      .bottom-bar { padding: 12px 16px 20px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <span class="logo-icon">🛒</span>
    <span class="logo-text">Grocery<span>Scanner</span></span>
    <span style="font-size:0.65rem; color:rgba(255,255,255,0.45); font-weight:500; margin-left:10px; white-space:nowrap;">developed by <a href="mailto:finnestad@gmail.com" style="color:#7eb8f7; text-decoration:underline; font-weight:600;">Andrew Finnestad</a></span>
  </div>
  <div class="tally-pill">
    <span class="tally-label">Total</span>
    <span class="tally-amount" id="tally">$0.00</span>
  </div>
</header>

<!-- TABS -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('scan')">📷 Scan</button>
  <button class="tab-btn" onclick="switchTab('cart')">🧺 Cart <span id="cart-badge"></span></button>
  <button class="tab-btn" onclick="switchTab('products')">📦 Products</button>
</div>

<div class="content">

  <!-- ═══ SCAN PANEL ═══ -->
  <div id="scan-panel" class="panel active">

    <div class="scanner-wrap">
      <div class="scanner-idle" id="scanner-idle">
        <div class="big-icon">📷</div>
        <p>Tap Start Scanner to activate camera</p>
      </div>
      <div class="scanner-live" id="scanner-live">
        <div id="interactive" class="viewport"></div>
        <div class="scan-overlay">
          <div class="scan-frame">
            <div class="scan-beam"></div>
          </div>
        </div>
      </div>
      <div class="scanner-controls">
        <button class="btn btn-green" id="start-btn" onclick="startScanner()">▶ Start Scanner</button>
        <button class="btn btn-ghost" id="stop-btn" onclick="stopScanner()" style="display:none">⏹ Stop</button>
        <button class="btn btn-ghost" id="flip-btn" onclick="flipCamera()" style="display:none; flex:none; padding:10px 14px; font-size:1.1rem;" title="Flip camera">🔄</button>
      </div>
    </div>

    <div id="flash" class="flash"></div>

    <div class="manual-row">
      <input class="input-field" id="manual-input" type="text" placeholder="Enter barcode manually…" maxlength="60" />
      <button class="btn btn-green" style="flex:none" onclick="manualAdd()">Add</button>
    </div>

    <div class="section-label">Current Cart</div>
    <div class="cart-list" id="cart-list"></div>

  </div>

  <!-- ═══ CART PANEL ═══ -->
  <div id="cart-panel" class="panel">
    <div class="search-row">
      <input class="search-field" id="cart-search" type="text" placeholder="🔍 Search cart…" oninput="renderCartFull()" />
      <button class="btn btn-danger" style="flex:none; padding:10px 14px; font-size:0.8rem;" onclick="clearCart()">🗑 Clear List</button>
    </div>
    <div class="items-grid" id="cart-full-list"></div>
  </div>

  <!-- ═══ PRODUCTS PANEL ═══ -->
  <div id="products-panel" class="panel">
    <div class="search-row">
      <input class="search-field" id="product-search" type="text" placeholder="🔍 Search saved products…" oninput="renderProducts()" />
      <button class="btn btn-danger" style="flex:none; padding:10px 14px; font-size:0.8rem;" onclick="clearProducts()">🗑 Clear List</button>
    </div>
    <!-- Batch toolbar -->
    <div class="batch-toolbar" id="batch-toolbar">
      <input type="checkbox" id="select-all-cb" class="product-cb" onchange="toggleSelectAll(this.checked)" title="Select all" />
      <span class="batch-count" id="batch-count">0 selected</span>
      <button class="btn btn-danger" style="padding:8px 14px; font-size:0.8rem;" onclick="deleteSelected()">🗑 Delete Selected</button>
      <button class="btn btn-ghost" style="padding:8px 12px; font-size:0.8rem;" onclick="clearSelection()">✕</button>
    </div>
    <div class="items-grid" id="products-list"></div>
  </div>

</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <button class="btn btn-warn" onclick="exportCSV()">⬇ Export CSV</button>
  <button class="btn btn-dark" onclick="openCompleteModal()">✓ Complete Shop</button>
</div>

<!-- ═══ NEW ITEM MODAL ═══ -->
<div class="modal-backdrop" id="new-item-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-eyebrow">New Item Found</div>
      <div class="modal-title">Enter item details</div>
      <div class="modal-barcode" id="modal-barcode-display"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Item Description</label>
      <input class="form-input" id="f-name" type="text" placeholder="e.g. Organic Whole Milk 2L" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Department</label>
        <select class="form-input" id="f-dept" onchange="handleDeptChange('f')"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Retail Price ($)</label>
        <input class="form-input" id="f-price" type="number" min="0" step="0.01" placeholder="0.00" />
      </div>
    </div>
    <div class="form-group" id="f-custom-dept-group" style="display:none;">
      <label class="form-label">New Department Name</label>
      <div style="display:flex; gap:8px;">
        <input class="form-input" id="f-custom-dept" type="text" placeholder="e.g. Deli" style="flex:1;" />
        <button type="button" class="btn btn-green" style="flex:none; padding:10px 16px;" onclick="addCustomDept('f')">Add</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Quantity</label>
      <input class="form-input" id="f-qty" type="number" min="1" step="1" value="1" />
    </div>
    <div id="new-item-error" style="display:none; background:#fde8e8; color:#b82a2a; border:1px solid #f0c0c0; border-radius:8px; padding:10px 14px; font-size:0.83rem; font-weight:600; margin-top:4px;"></div>
    <div class="modal-actions">

</div>

<!-- ═══ EDIT PRODUCT MODAL ═══ -->
<div class="modal-backdrop" id="edit-modal">
  <div class="modal">
    <div class="modal-header">

      <button class="btn btn-green" onclick="saveEdit()">Save Changes</button>

</div>

<!-- ═══ EDIT CART ITEM MODAL ═══ -->
<div class="modal-backdrop" id="cart-edit-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-eyebrow">Edit Cart Item</div>
      <div class="modal-title" id="ce-title"></div>
      <div class="modal-barcode" id="ce-barcode-display"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Item Description</label>
      <input class="form-input" id="ce-name" type="text" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Department</label>
        <select class="form-input" id="ce-dept" onchange="handleDeptChange('ce')"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Retail Price ($)</label>
        <input class="form-input" id="ce-price" type="number" min="0" step="0.01" />
      </div>
    </div>
    <div class="form-group" id="ce-custom-dept-group" style="display:none;">
      <label class="form-label">New Department Name</label>
      <div style="display:flex; gap:8px;">
        <input class="form-input" id="ce-custom-dept" type="text" placeholder="e.g. Deli" style="flex:1;" />
        <button type="button" class="btn btn-green" style="flex:none; padding:10px 16px;" onclick="addCustomDept('ce')">Add</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Quantity</label>
      <input class="form-input" id="ce-qty" type="number" min="1" step="1" value="1" />
    </div>
    <div id="ce-error" style="display:none; background:#fde8e8; color:#b82a2a; border:1px solid #f0c0c0; border-radius:8px; padding:10px 14px; font-size:0.83rem; font-weight:600; margin-top:4px;">Please fill in all fields.</div>
    <div class="modal-actions">
      <button class="btn btn-danger" style="flex:none;" onclick="removeFromCartAndClose()">🗑 Remove</button>
      <button class="btn btn-ghost" onclick="closeCartEditModal()">Cancel</button>
      <button class="btn btn-green" onclick="saveCartEdit()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
const BASE_DEPTS = ['Bakery','Dairy','Ethnic','Frozen','Grocery','Health and Beauty','Natural Foods','Other','Produce'];
let customDepts = JSON.parse(localStorage.getItem('gs_custom_depts') || '[]');
let productDB   = JSON.parse(localStorage.getItem('gs_products') || '[]');
let cart        = JSON.parse(localStorage.getItem('gs_cart')     || '[]');
let pendingCode = null;
let editingCode = null;
let scannerRunning = false;
let lastCode = null;
let lastCodeTime = 0;

// ── Department helpers ──
function getDepts() {
  const all = [...new Set([...BASE_DEPTS, ...customDepts])];
  // Keep "Other" always last, sort the rest alphabetically
  const withoutOther = all.filter(d => d !== 'Other').sort((a,b) => a.localeCompare(b));
  return [...withoutOther, 'Other'];
}

function saveDepts() { localStorage.setItem('gs_custom_depts', JSON.stringify(customDepts)); }

function populateSelect(selectId, selectedValue) {
  const sel = document.getElementById(selectId);
  if (!sel) return;
  const depts = getDepts();
  sel.innerHTML = '<option value="">Select…</option>' +
    depts.map(d => `<option value="${escHtml(d)}"${d === selectedValue ? ' selected' : ''}>${escHtml(d)}</option>`).join('');
}

function handleDeptChange(prefix) {
  const val = document.getElementById(prefix + '-dept').value;
  const group = document.getElementById(prefix + '-custom-dept-group');
  if (val === 'Other') {
    group.style.display = 'block';
    document.getElementById(prefix + '-custom-dept').focus();
  } else {
    group.style.display = 'none';
  }
}

function addCustomDept(prefix) {
  const input = document.getElementById(prefix + '-custom-dept');
  const name  = input.value.trim();
  if (!name || name.toLowerCase() === 'other') return;

  // Check if already exists (case-insensitive)
  const exists = getDepts().some(d => d.toLowerCase() === name.toLowerCase());
  if (!exists) {
    customDepts.push(name);
    saveDepts();
  }

  // Re-populate and select the new dept
  const canonical = getDepts().find(d => d.toLowerCase() === name.toLowerCase()) || name;
  populateSelect(prefix + '-dept', canonical);
  document.getElementById(prefix + '-custom-dept-group').style.display = 'none';
  input.value = '';
}

// ══════════════════════════════════════════
//  PERSIST
// ══════════════════════════════════════════
function saveDB()   { localStorage.setItem('gs_products', JSON.stringify(productDB)); }
function saveCart() { localStorage.setItem('gs_cart',     JSON.stringify(cart)); }

// ══════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['scan','cart','products'][i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(name + '-panel').classList.add('active');
  if (name === 'products') renderProducts();
  if (name === 'cart')     renderCartFull();
}

// ══════════════════════════════════════════
//  SCANNER
// ══════════════════════════════════════════
let currentFacing = 'environment'; // default: back camera

function startScanner(facing) {
  if (facing) currentFacing = facing;

  document.getElementById('scanner-idle').style.display = 'none';
  document.getElementById('scanner-live').style.display = 'block';
  document.getElementById('start-btn').style.display    = 'none';
  document.getElementById('stop-btn').style.display     = '';
  document.getElementById('flip-btn').style.display     = '';

  // Stop any existing instance cleanly before re-init
  if (scannerRunning) {
    Quagga.stop();
    scannerRunning = false;
  }

  Quagga.init({
    inputStream: {
      name: "Live",
      type: "LiveStream",
      target: document.querySelector('#interactive'),
      constraints: { facingMode: currentFacing, width: 640, height: 480 }
    },
    decoder: {
      readers: ["ean_reader"]
    },
    locate: true
  }, err => {
    if (err) { showFlash('Camera error: ' + err.message, 'error'); stopScanner(); return; }
    Quagga.start();
    scannerRunning = true;
    updateFlipBtn();
  });

  Quagga.onDetected(data => {
    let code   = data.codeResult.code;
    const now  = Date.now();

    // EAN-13: strip leading digit and trailing check digit to get inner product code
    // e.g. 841710143119 → 4171014311
    if (code && code.length === 13) {
      code = code.slice(1, -1);
    }

    if (code === lastCode && now - lastCodeTime < 2500) return;
    lastCode     = code;
    lastCodeTime = now;
    processCode(code);
  });
}

function stopScanner() {
  if (scannerRunning) { Quagga.stop(); scannerRunning = false; }
  document.getElementById('scanner-idle').style.display = '';
  document.getElementById('scanner-live').style.display = 'none';
  document.getElementById('start-btn').style.display    = '';
  document.getElementById('stop-btn').style.display     = 'none';
  document.getElementById('flip-btn').style.display     = 'none';
}

function flipCamera() {
  currentFacing = currentFacing === 'environment' ? 'user' : 'environment';
  startScanner(currentFacing);
}

function updateFlipBtn() {
  const btn = document.getElementById('flip-btn');
  btn.title = currentFacing === 'environment' ? 'Switch to front camera' : 'Switch to back camera';
}

// ══════════════════════════════════════════
//  MANUAL
// ══════════════════════════════════════════
function manualAdd() {
  const inp = document.getElementById('manual-input');
  const val = inp.value.trim();
  if (!val) return;
  processCode(val);
  inp.value = '';
}

document.getElementById('manual-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') manualAdd();
});

// ══════════════════════════════════════════
//  CORE: PROCESS A SCAN / ENTRY
// ══════════════════════════════════════════
function processCode(code) {
  code = code.trim();
  if (!code) return;

  const product = productDB.find(p => p.barcode === code);

  if (!product) {
    // Unknown — open modal to collect details
    pendingCode = code;
    document.getElementById('modal-barcode-display').textContent = 'Barcode: ' + code;
    document.getElementById('f-name').value  = '';
    document.getElementById('f-price').value = '';
    document.getElementById('f-qty').value   = '1';
    document.getElementById('f-custom-dept-group').style.display = 'none';
    populateSelect('f-dept', '');
    document.getElementById('new-item-modal').classList.add('open');
    setTimeout(() => document.getElementById('f-name').focus(), 200);
    return;
  }

  // Known — add to cart (increment qty if already in cart)
  addToCart(product, 1);
  showFlash(`✓ ${product.name} added — $${fmt(product.price)}`, 'success');
}

// ══════════════════════════════════════════
//  CART
// ══════════════════════════════════════════
function addToCart(product, qty) {
  const existing = cart.find(c => c.barcode === product.barcode);
  if (existing) {
    existing.qty += qty;
  } else {
    cart.unshift({
      barcode: product.barcode,
      name:    product.name,
      dept:    product.dept,
      price:   product.price,
      qty:     qty
    });
  }
  saveCart();
  renderCartMini();
  updateTally();
  updateCartBadge();
}

function removeFromCart(barcode) {
  cart = cart.filter(c => c.barcode !== barcode);
  saveCart();
  renderCartMini();
  renderCartFull();
  updateTally();
  updateCartBadge();
}

function clearCart() {
  if (!cart.length) { showToast('Cart is already empty'); return; }
  const n = cart.reduce((s, c) => s + c.qty, 0);
  cart = [];
  saveCart();
  renderCartMini();
  renderCartFull();
  updateTally();
  updateCartBadge();
  showToast(`${n} item${n !== 1 ? 's' : ''} cleared from cart`);
}

function updateTally() {
  const total = cart.reduce((s, c) => s + parseFloat(c.price) * c.qty, 0);
  const el    = document.getElementById('tally');
  el.textContent = '$' + fmt(total);
  el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 300);
}

function updateCartBadge() {
  const count = cart.reduce((s, c) => s + c.qty, 0);
  document.getElementById('cart-badge').textContent = count > 0 ? `(${count})` : '';
}

function cartCardHTML(c) {
  const sb = c.barcode.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  return `
    <div class="cart-card" onclick="openCartEdit('${sb}')" style="cursor:pointer;" title="Tap to edit">
      <span class="cart-dept">${escHtml(c.dept || '—')}</span>
      <div class="cart-info">
        <div class="cart-name">${escHtml(c.name)}</div>
        <div class="cart-barcode">${c.barcode}</div>
      </div>
      <div class="cart-price-block">
        <div class="cart-line-total">$${fmt(c.price * c.qty)}</div>
        <div class="cart-qty">×${c.qty} @ $${fmt(c.price)}</div>
      </div>
      <button class="cart-remove" onclick="event.stopPropagation(); removeFromCart('${sb}')" title="Remove">✕</button>
    </div>`;
}

function renderCartMini() {
  const el = document.getElementById('cart-list');
  if (!cart.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">🧺</div><p>Nothing scanned yet.</p></div>`;
    return;
  }
  el.innerHTML = cart.map(cartCardHTML).join('');
}

function renderCartFull() {
  const q    = (document.getElementById('cart-search')?.value || '').toLowerCase();
  const el   = document.getElementById('cart-full-list');
  const list = cart.filter(c =>
    c.name.toLowerCase().includes(q) || c.barcode.includes(q) || (c.dept||'').toLowerCase().includes(q)
  );
  if (!cart.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">🧺</div><p>Cart is empty.</p></div>`;
    return;
  }
  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>No items match your search.</p></div>`;
    return;
  }
  el.innerHTML = list.map(cartCardHTML).join('');
}

// ══════════════════════════════════════════
//  NEW ITEM MODAL
// ══════════════════════════════════════════
function closeNewItemModal() {
  const modal = document.getElementById('new-item-modal');
  modal.classList.remove('open');
  modal.style.display = 'none';
  setTimeout(() => { modal.style.display = ''; }, 50);
  pendingCode = null;
  document.getElementById('new-item-error').style.display = 'none';
  document.getElementById('f-custom-dept-group').style.display = 'none';
}

function saveNewItem() {
  const name  = document.getElementById('f-name').value.trim();
  const dept  = document.getElementById('f-dept').value;
  const price = parseFloat(document.getElementById('f-price').value);
  const qty   = parseInt(document.getElementById('f-qty').value) || 1;
  const errEl = document.getElementById('new-item-error');

  if (!name) {
    errEl.textContent = 'Please enter an item description.';
    errEl.style.display = 'block';
    document.getElementById('f-name').focus();
    return;
  }
  if (!dept) {
    errEl.textContent = 'Please select a department.';
    errEl.style.display = 'block';
    document.getElementById('f-dept').focus();
    return;
  }
  if (isNaN(price) || price < 0) {
    errEl.textContent = 'Please enter a valid retail price.';
    errEl.style.display = 'block';
    document.getElementById('f-price').focus();
    return;
  }

  errEl.style.display = 'none';

  const product = {
    barcode:  pendingCode,
    name, dept, price,
    addedAt: new Date().toISOString()
  };

  const idx = productDB.findIndex(p => p.barcode === pendingCode);
  if (idx >= 0) productDB[idx] = product;
  else          productDB.unshift(product);
  saveDB();

  addToCart(product, qty);
  closeNewItemModal();
  showFlash(`✓ "${name}" saved & added — $${fmt(price * qty)}`, 'success');
  showToast('Item saved to product database');
}

// ══════════════════════════════════════════
//  PRODUCTS PANEL
// ══════════════════════════════════════════
const DEPT_ICONS = {
  'Bakery':'🍞','Dairy':'🥛','Ethnic':'🌍','Frozen':'🧊',
  'Grocery':'🛒','Health and Beauty':'🧴','Natural Foods':'🌿',
  'Other':'📦','Produce':'🥦'
};

let selectedBarcodes = new Set();

function renderProducts() {
  const q    = (document.getElementById('product-search').value || '').toLowerCase();
  const el   = document.getElementById('products-list');
  const list = productDB.filter(p =>
    p.name.toLowerCase().includes(q) || p.barcode.includes(q) || (p.dept||'').toLowerCase().includes(q)
  );

  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>${q ? 'No matches.' : 'No products saved yet.'}</p></div>`;
    updateBatchToolbar(0, 0);
    return;
  }

  el.innerHTML = list.map(p => {
    const sel = selectedBarcodes.has(p.barcode);
    const sb  = p.barcode.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `
    <div class="product-card${sel ? ' selected' : ''}" id="pc-${p.barcode.replace(/[^a-zA-Z0-9]/g,'_')}"
      onclick="openEdit('${sb}')" style="cursor:pointer;" title="Tap to edit">
      <input type="checkbox" class="product-cb" ${sel ? 'checked' : ''}
        onclick="event.stopPropagation()"
        onchange="toggleSelect('${sb}', this.checked)" />
      <div class="product-icon">${DEPT_ICONS[p.dept] || '📦'}</div>
      <div class="product-info">
        <div class="product-name">${escHtml(p.name)}</div>
        <div class="product-meta">${escHtml(p.dept||'—')} · ${p.barcode}</div>
      </div>
      <div class="product-price">$${fmt(p.price)}</div>
      <div class="product-actions">
        <button class="icon-btn del" onclick="event.stopPropagation(); confirmDelete('${sb}')" title="Delete">🗑️</button>
      </div>
    </div>`;
  }).join('');

  updateBatchToolbar(selectedBarcodes.size, list.length);
}

function confirmDelete(barcode) {
  productDB = productDB.filter(p => p.barcode !== barcode);
  selectedBarcodes.delete(barcode);
  saveDB();
  renderProducts();
  showToast('Product removed');
}

// ── Batch / selection ──
function toggleSelect(barcode, checked) {
  if (checked) selectedBarcodes.add(barcode);
  else         selectedBarcodes.delete(barcode);
  const card = document.getElementById('pc-' + safeId(barcode));
  if (card) card.classList.toggle('selected', checked);
  const q    = (document.getElementById('product-search').value || '').toLowerCase();
  const visibleCount = productDB.filter(p =>
    p.name.toLowerCase().includes(q) || p.barcode.includes(q) || (p.dept||'').toLowerCase().includes(q)
  ).length;
  updateBatchToolbar(selectedBarcodes.size, visibleCount);
}

function toggleSelectAll(checked) {
  const q    = (document.getElementById('product-search').value || '').toLowerCase();
  const list = productDB.filter(p =>
    p.name.toLowerCase().includes(q) || p.barcode.includes(q) || (p.dept||'').toLowerCase().includes(q)
  );
  list.forEach(p => {
    if (checked) selectedBarcodes.add(p.barcode);
    else         selectedBarcodes.delete(p.barcode);
  });
  renderProducts();
}

function clearSelection() {
  selectedBarcodes.clear();
  renderProducts();
}

function updateBatchToolbar(n, total) {
  const countEl  = document.getElementById('batch-count');
  const allCb    = document.getElementById('select-all-cb');
  const delBtn   = document.querySelector('#batch-toolbar .btn-danger');

  countEl.textContent = n > 0 ? `${n} of ${total} selected` : 'Check boxes to select items';
  countEl.style.color = n > 0 ? 'var(--accent)' : 'var(--ink2)';
  if (delBtn) delBtn.style.opacity = n > 0 ? '1' : '0.4';

  if (allCb) {
    allCb.checked       = total > 0 && n >= total;
    allCb.indeterminate = n > 0 && n < total;
  }
}

function deleteSelected() {
  if (selectedBarcodes.size === 0) { showToast('No items selected'); return; }
  const n = selectedBarcodes.size;
  productDB = productDB.filter(p => !selectedBarcodes.has(p.barcode));
  selectedBarcodes.clear();
  saveDB();
  renderProducts();
  showToast(`${n} product${n !== 1 ? 's' : ''} deleted`);
}

function clearProducts() {
  if (!productDB.length) { showToast('No products to clear'); return; }
  const n = productDB.length;
  // Select all briefly so user sees the action, then delete
  productDB.forEach(p => selectedBarcodes.add(p.barcode));
  renderProducts();
  setTimeout(() => {
    productDB = [];
    selectedBarcodes.clear();
    saveDB();
    renderProducts();
    showToast(`${n} product${n !== 1 ? 's' : ''} cleared`);
  }, 250);
}

// ══════════════════════════════════════════
//  EDIT MODAL
// ══════════════════════════════════════════
function openEdit(barcode) {
  const p = productDB.find(x => x.barcode === barcode);
  if (!p) return;
  editingCode = barcode;
  document.getElementById('edit-barcode-display').textContent = 'Barcode: ' + barcode;
  document.getElementById('ef-name').value  = p.name;
  document.getElementById('ef-price').value = p.price;
  document.getElementById('ef-custom-dept-group').style.display = 'none';
  populateSelect('ef-dept', p.dept);
  document.getElementById('edit-modal').classList.add('open');
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
  editingCode = null;
}

function saveEdit() {
  const name  = document.getElementById('ef-name').value.trim();
  const dept  = document.getElementById('ef-dept').value;
  const price = parseFloat(document.getElementById('ef-price').value);

  if (!name || !dept || isNaN(price)) {
    document.getElementById('edit-error').style.display = 'block';
    return;
  }
  document.getElementById('edit-error').style.display = 'none';

  const idx = productDB.findIndex(p => p.barcode === editingCode);
  if (idx >= 0) { productDB[idx] = { ...productDB[idx], name, dept, price }; saveDB(); }

  // Also update in cart if present
  const ci = cart.findIndex(c => c.barcode === editingCode);
  if (ci >= 0) { cart[ci] = { ...cart[ci], name, dept, price }; saveCart(); }

  closeEditModal();
  renderProducts();
  renderCartMini();
  updateTally();
  showToast('Product updated');
}

// ══════════════════════════════════════════
//  COMPLETE SHOP
// ══════════════════════════════════════════
function openCompleteModal() {
  if (!cart.length) { showToast('Cart is empty!'); return; }

  const total    = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const itemCount = cart.reduce((s, c) => s + c.qty, 0);

  const rows = cart.map(c => `
    <div class="summary-row">
      <span>${escHtml(c.name)} <small style="color:var(--ink2)">×${c.qty}</small></span>
      <span class="price">$${fmt(c.price * c.qty)}</span>
    </div>
  `).join('');

  document.getElementById('complete-summary').innerHTML = `
    ${rows}
    <div class="summary-total">
      <span class="summary-total-label">Grand Total · ${itemCount} item${itemCount !== 1 ? 's' : ''}</span>
      <span class="summary-total-amount">$${fmt(total)}</span>
    </div>
  `;

  document.getElementById('complete-modal').classList.add('open');
}

function closeCompleteModal() {
  document.getElementById('complete-modal').classList.remove('open');
}

function newShop() {
  cart = [];
  saveCart();
  closeCompleteModal();
  renderCartMini();
  updateTally();
  updateCartBadge();
  showToast('New shop started!');
}

// ══════════════════════════════════════════
//  CSV EXPORT
// ══════════════════════════════════════════
function exportCSV() {
  if (!cart.length) { showToast('Nothing to export!'); return; }

  const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const now   = new Date();
  const date  = now.toLocaleDateString();
  const time  = now.toLocaleTimeString();

  let csv = 'Barcode,Description,Department,Unit Price,Quantity,Line Total\n';
  cart.forEach(c => {
    csv += [
      `"${c.barcode}"`,
      `"${String(c.name).replace(/"/g,'""')}"`,
      `"${String(c.dept||'').replace(/"/g,'""')}"`,
      fmt(c.price),
      c.qty,
      fmt(c.price * c.qty)
    ].join(',') + '\n';
  });

  csv += `\n"Shop Date","${date} ${time}","","","Grand Total","$${fmt(total)}"\n`;

  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `shop_${now.toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV downloaded!');
}

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
let flashTimer;
function showFlash(msg, type) {
  const el = document.getElementById('flash');
  el.textContent = msg;
  el.className   = 'flash ' + type;
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => { el.className = 'flash'; }, 4000);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

function fmt(n)    { return parseFloat(n || 0).toFixed(2); }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// Close modals on backdrop click
document.querySelectorAll('.modal-backdrop').forEach(bd => {
  bd.addEventListener('click', e => {
    if (e.target === bd) {
      bd.classList.remove('open');
      pendingCode        = null;
      editingCode        = null;
      editingCartBarcode = null;
    }
  });
});

// ══════════════════════════════════════════
//  CART ITEM EDIT MODAL
// ══════════════════════════════════════════
let editingCartBarcode = null;

function openCartEdit(barcode) {
  const item = cart.find(c => c.barcode === barcode);
  if (!item) return;
  editingCartBarcode = barcode;
  document.getElementById('ce-title').textContent      = item.name;
  document.getElementById('ce-barcode-display').textContent = 'Barcode: ' + barcode;
  document.getElementById('ce-name').value  = item.name;
  document.getElementById('ce-price').value = item.price;
  document.getElementById('ce-qty').value   = item.qty;
  document.getElementById('ce-custom-dept-group').style.display = 'none';
  document.getElementById('ce-error').style.display = 'none';
  populateSelect('ce-dept', item.dept);
  document.getElementById('cart-edit-modal').classList.add('open');
  setTimeout(() => document.getElementById('ce-name').focus(), 200);
}

function closeCartEditModal() {
  const modal = document.getElementById('cart-edit-modal');
  modal.classList.remove('open');
  modal.style.display = 'none';
  setTimeout(() => { modal.style.display = ''; }, 50);
  editingCartBarcode = null;
  document.getElementById('ce-custom-dept-group').style.display = 'none';
  document.getElementById('ce-error').style.display = 'none';
}

function saveCartEdit() {
  const name  = document.getElementById('ce-name').value.trim();
  const dept  = document.getElementById('ce-dept').value;
  const price = parseFloat(document.getElementById('ce-price').value);
  const qty   = parseInt(document.getElementById('ce-qty').value) || 1;
  const errEl = document.getElementById('ce-error');

  if (!name || !dept || isNaN(price) || price < 0) {
    errEl.textContent   = 'Please fill in all fields correctly.';
    errEl.style.display = 'block';
    return;
  }

  // Update cart entry
  const ci = cart.findIndex(c => c.barcode === editingCartBarcode);
  if (ci >= 0) {
    cart[ci] = { ...cart[ci], name, dept, price, qty };
    saveCart();
  }

  // Also update product DB so future scans use the new details
  const pi = productDB.findIndex(p => p.barcode === editingCartBarcode);
  if (pi >= 0) {
    productDB[pi] = { ...productDB[pi], name, dept, price };
    saveDB();
  }

  closeCartEditModal();
  renderCartMini();
  renderCartFull();
  updateTally();
  showToast('Item updated');
}

function removeFromCartAndClose() {
  if (editingCartBarcode) removeFromCart(editingCartBarcode);
  closeCartEditModal();
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
renderCartMini();
updateTally();
updateCartBadge();
</script>
