<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ScanTrack</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

:root {
--bg:#0a0a0f;
--surface:#13131a;
--card:#1c1c27;
--border:#2a2a3d;
--accent:#00e5a0;
--accent2:#7c6aff;
--warn:#ff7c4d;
--text:#f0f0f8;
--muted:#6b6b8a;
--success:#00e5a0;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

body{
font-family:'Syne',sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
overflow-x:hidden;
}

/* Top bar */
.topbar{
position:sticky;
top:0;
z-index:100;
background:rgba(10,10,15,0.92);
backdrop-filter:blur(16px);
border-bottom:1px solid var(--border);
padding:14px 20px;
display:flex;
align-items:center;
justify-content:space-between;
}

.topbar-logo{
font-size:1.2rem;
font-weight:800;
letter-spacing:-0.5px;
}

.topbar-logo span{color:var(--accent);}

.topbar-total{
font-family:'DM Mono',monospace;
font-size:0.85rem;
color:var(--accent);
background:rgba(0,229,160,0.1);
border:1px solid rgba(0,229,160,0.25);
padding:4px 10px;
border-radius:20px;
}

/* Navigation */
.nav{
display:flex;
background:var(--surface);
border-bottom:1px solid var(--border);
overflow-x:auto;
}

.nav-tab{
flex:1;
min-width:80px;
padding:12px 8px;
text-align:center;
font-size:0.7rem;
font-weight:700;
letter-spacing:0.05em;
text-transform:uppercase;
color:var(--muted);
cursor:pointer;
border:none;
background:none;
border-bottom:2px solid transparent;
}

.nav-tab.active{
color:var(--accent);
border-bottom-color:var(--accent);
}

.screen{display:none;padding:20px;padding-bottom:40px;}
.screen.active{display:block;}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:16px;
padding:16px;
margin-bottom:14px;
}

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
width:100%;
padding:14px 20px;
border-radius:12px;
border:none;
cursor:pointer;
font-family:'Syne',sans-serif;
font-weight:700;
font-size:0.95rem;
}

.btn-primary{background:var(--accent);color:#000;}
.btn-secondary{background:var(--accent2);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text);}
.btn-danger{background:rgba(255,60,60,0.15);border:1px solid rgba(255,60,60,0.3);color:#ff6060;}

.item-row{
display:flex;
align-items:center;
gap:12px;
padding:12px 0;
border-bottom:1px solid var(--border);
}

.item-icon{
width:40px;
height:40px;
border-radius:10px;
background:rgba(124,106,255,0.15);
border:1px solid rgba(124,106,255,0.25);
display:flex;
align-items:center;
justify-content:center;
}

.item-info{flex:1;}

.item-name{font-size:0.9rem;font-weight:700;}

.toast{
position:fixed;
bottom:90px;
left:50%;
transform:translateX(-50%);
background:var(--card);
border:1px solid var(--border);
border-left:3px solid var(--accent);
padding:12px 18px;
border-radius:12px;
font-size:0.85rem;
font-weight:600;
opacity:0;
transition:0.3s;
}

.toast.show{opacity:1;}
</style>
</head>

<body>

<div class="topbar">
<div class="topbar-logo">Scan<span>Track</span></div>
<div class="topbar-total" id="session-total-badge">$0.00</div>
</div>

<nav class="nav">
<button class="nav-tab active" onclick="showScreen('home')" id="tab-home">🏠 Home</button>
<button class="nav-tab" onclick="showScreen('list')" id="tab-list">🛒 List</button>
<button class="nav-tab" onclick="showScreen('session')" id="tab-session">📦 Session</button>
<button class="nav-tab" onclick="showScreen('products')" id="tab-products">🗄️ Products</button>
<button class="nav-tab" onclick="showScreen('export')" id="tab-export">📤 Export</button>
</nav>

<div class="screen active" id="screen-home">
<h2>Welcome to ScanTrack</h2>
<p>Scan barcodes to build shopping lists and track in-store purchases.</p>

<button class="btn btn-secondary" onclick="startScan('list')">📷 Scan for List</button>
<br><br>
<button class="btn btn-primary" onclick="startScan('session')">📷 Scan Item</button>
</div>

<div class="toast" id="toast"></div>

<script>

/* simple storage */
const DB={
get:k=>JSON.parse(localStorage.getItem(k)||'[]'),
set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
};

const PRODUCTS_KEY='st_products';
const LIST_KEY='st_list';
const SESSION_KEY='st_session';

function showScreen(name){

document.querySelectorAll('.screen')
.forEach(s=>s.classList.remove('active'));

document.querySelectorAll('.nav-tab')
.forEach(t=>t.classList.remove('active'));

document.getElementById('screen-'+name).classList.add('active');
document.getElementById('tab-'+name).classList.add('active');
}

/* scanner */

let scannerRunning=false;

function startScan(){

if(scannerRunning) return;

Quagga.init({

inputStream:{
type:'LiveStream',
constraints:{facingMode:'environment'},
target:document.body
},

decoder:{
readers:[
'ean_reader',
'upc_reader',
'code_128_reader'
]
}

},err=>{

if(err){
toast('Camera unavailable');
return;
}

Quagga.start();
scannerRunning=true;

});

Quagga.onDetected(data=>{
const code=data.codeResult.code;
toast("Detected barcode: "+code);
Quagga.stop();
scannerRunning=false;
});

}

/* toast */

let toastTimer;

function toast(msg){

const el=document.getElementById('toast');

el.textContent=msg;
el.classList.add('show');

clearTimeout(toastTimer);

toastTimer=setTimeout(()=>{
el.classList.remove('show');
},2500);

}

</script>

</body>
</html>
